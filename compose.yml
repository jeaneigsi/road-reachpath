services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REACHPATH_POSTGRES_DB:-reachpath}
      POSTGRES_USER: ${REACHPATH_POSTGRES_USER:-reachpath}
      POSTGRES_PASSWORD: ${REACHPATH_POSTGRES_PASSWORD:?set REACHPATH_POSTGRES_PASSWORD in .env}
    volumes:
      - reachpath-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      REACHPATH_ENVIRONMENT: production
      REACHPATH_DRY_RUN: ${REACHPATH_DRY_RUN:-false}
      REACHPATH_AUTO_EXECUTE: "false"
      REACHPATH_REQUIRE_AUTH: "true"
      REACHPATH_CORS_ORIGINS: ${REACHPATH_CORS_ORIGINS:-http://localhost:3000}
      REACHPATH_API_KEYS: ${REACHPATH_API_KEYS:?set REACHPATH_API_KEYS in .env}
      REACHPATH_ADMIN_API_KEYS: ${REACHPATH_ADMIN_API_KEYS:?set REACHPATH_ADMIN_API_KEYS in .env}
      REACHPATH_DATABASE_URL: postgresql+psycopg://${REACHPATH_POSTGRES_USER:-reachpath}:${REACHPATH_POSTGRES_PASSWORD}@postgres:5432/${REACHPATH_POSTGRES_DB:-reachpath}
      REACHPATH_ARGUS_URL: ${REACHPATH_ARGUS_URL:-http://host.docker.internal:8000}
      REACHPATH_SEARCHSWARM_URL: ${REACHPATH_SEARCHSWARM_URL:-http://host.docker.internal:8012}
      REACHPATH_REPORTFORGE_URL: ${REACHPATH_REPORTFORGE_URL:-http://host.docker.internal:8011}
      REACHPATH_ARGUS_API_KEY: ${REACHPATH_ARGUS_API_KEY:?set REACHPATH_ARGUS_API_KEY in .env}
      REACHPATH_SEARCHSWARM_API_KEY: ${REACHPATH_SEARCHSWARM_API_KEY:?set REACHPATH_SEARCHSWARM_API_KEY in .env}
      REACHPATH_REPORTFORGE_API_KEY: ${REACHPATH_REPORTFORGE_API_KEY:?set REACHPATH_REPORTFORGE_API_KEY in .env}
      REACHPATH_SERVICE_CIRCUIT_FAILURE_THRESHOLD: ${REACHPATH_SERVICE_CIRCUIT_FAILURE_THRESHOLD:-3}
      REACHPATH_SERVICE_CIRCUIT_COOLDOWN_SECONDS: ${REACHPATH_SERVICE_CIRCUIT_COOLDOWN_SECONDS:-30}
      REACHPATH_OAUTH_ENCRYPTION_KEY: ${REACHPATH_OAUTH_ENCRYPTION_KEY:?set REACHPATH_OAUTH_ENCRYPTION_KEY in .env}
      REACHPATH_OAUTH_STATE_TTL_SECONDS: ${REACHPATH_OAUTH_STATE_TTL_SECONDS:-600}
      REACHPATH_HUBSPOT_CLIENT_ID: ${REACHPATH_HUBSPOT_CLIENT_ID:-}
      REACHPATH_HUBSPOT_CLIENT_SECRET: ${REACHPATH_HUBSPOT_CLIENT_SECRET:-}
      REACHPATH_HUBSPOT_REDIRECT_URI: ${REACHPATH_HUBSPOT_REDIRECT_URI:-}
      REACHPATH_SALESFORCE_CLIENT_ID: ${REACHPATH_SALESFORCE_CLIENT_ID:-}
      REACHPATH_SALESFORCE_CLIENT_SECRET: ${REACHPATH_SALESFORCE_CLIENT_SECRET:-}
      REACHPATH_SALESFORCE_REDIRECT_URI: ${REACHPATH_SALESFORCE_REDIRECT_URI:-}
      REACHPATH_SALESFORCE_API_VERSION: ${REACHPATH_SALESFORCE_API_VERSION:-v60.0}
      REACHPATH_PIPEDRIVE_CLIENT_ID: ${REACHPATH_PIPEDRIVE_CLIENT_ID:-}
      REACHPATH_PIPEDRIVE_CLIENT_SECRET: ${REACHPATH_PIPEDRIVE_CLIENT_SECRET:-}
      REACHPATH_PIPEDRIVE_REDIRECT_URI: ${REACHPATH_PIPEDRIVE_REDIRECT_URI:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8020:8020"

  worker:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && reachpath worker --poll-interval 1"]
    environment:
      REACHPATH_ENVIRONMENT: production
      REACHPATH_DRY_RUN: ${REACHPATH_DRY_RUN:-false}
      REACHPATH_AUTO_EXECUTE: "false"
      REACHPATH_REQUIRE_AUTH: "true"
      REACHPATH_CORS_ORIGINS: ${REACHPATH_CORS_ORIGINS:-http://localhost:3000}
      REACHPATH_API_KEYS: ${REACHPATH_API_KEYS:?set REACHPATH_API_KEYS in .env}
      REACHPATH_ADMIN_API_KEYS: ${REACHPATH_ADMIN_API_KEYS:?set REACHPATH_ADMIN_API_KEYS in .env}
      REACHPATH_DATABASE_URL: postgresql+psycopg://${REACHPATH_POSTGRES_USER:-reachpath}:${REACHPATH_POSTGRES_PASSWORD}@postgres:5432/${REACHPATH_POSTGRES_DB:-reachpath}
      REACHPATH_ARGUS_URL: ${REACHPATH_ARGUS_URL:-http://host.docker.internal:8000}
      REACHPATH_SEARCHSWARM_URL: ${REACHPATH_SEARCHSWARM_URL:-http://host.docker.internal:8012}
      REACHPATH_REPORTFORGE_URL: ${REACHPATH_REPORTFORGE_URL:-http://host.docker.internal:8011}
      REACHPATH_ARGUS_API_KEY: ${REACHPATH_ARGUS_API_KEY:?set REACHPATH_ARGUS_API_KEY in .env}
      REACHPATH_SEARCHSWARM_API_KEY: ${REACHPATH_SEARCHSWARM_API_KEY:?set REACHPATH_SEARCHSWARM_API_KEY in .env}
      REACHPATH_REPORTFORGE_API_KEY: ${REACHPATH_REPORTFORGE_API_KEY:?set REACHPATH_REPORTFORGE_API_KEY in .env}
      REACHPATH_SERVICE_CIRCUIT_FAILURE_THRESHOLD: ${REACHPATH_SERVICE_CIRCUIT_FAILURE_THRESHOLD:-3}
      REACHPATH_SERVICE_CIRCUIT_COOLDOWN_SECONDS: ${REACHPATH_SERVICE_CIRCUIT_COOLDOWN_SECONDS:-30}
      REACHPATH_OAUTH_ENCRYPTION_KEY: ${REACHPATH_OAUTH_ENCRYPTION_KEY:?set REACHPATH_OAUTH_ENCRYPTION_KEY in .env}
      REACHPATH_OAUTH_STATE_TTL_SECONDS: ${REACHPATH_OAUTH_STATE_TTL_SECONDS:-600}
      REACHPATH_HUBSPOT_CLIENT_ID: ${REACHPATH_HUBSPOT_CLIENT_ID:-}
      REACHPATH_HUBSPOT_CLIENT_SECRET: ${REACHPATH_HUBSPOT_CLIENT_SECRET:-}
      REACHPATH_HUBSPOT_REDIRECT_URI: ${REACHPATH_HUBSPOT_REDIRECT_URI:-}
      REACHPATH_SALESFORCE_CLIENT_ID: ${REACHPATH_SALESFORCE_CLIENT_ID:-}
      REACHPATH_SALESFORCE_CLIENT_SECRET: ${REACHPATH_SALESFORCE_CLIENT_SECRET:-}
      REACHPATH_SALESFORCE_REDIRECT_URI: ${REACHPATH_SALESFORCE_REDIRECT_URI:-}
      REACHPATH_SALESFORCE_API_VERSION: ${REACHPATH_SALESFORCE_API_VERSION:-v60.0}
      REACHPATH_PIPEDRIVE_CLIENT_ID: ${REACHPATH_PIPEDRIVE_CLIENT_ID:-}
      REACHPATH_PIPEDRIVE_CLIENT_SECRET: ${REACHPATH_PIPEDRIVE_CLIENT_SECRET:-}
      REACHPATH_PIPEDRIVE_REDIRECT_URI: ${REACHPATH_PIPEDRIVE_REDIRECT_URI:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACHPATH_API_URL: ${REACHPATH_FRONTEND_BUILD_API_URL:-http://api:8020}
    restart: unless-stopped
    environment:
      REACHPATH_API_URL: ${REACHPATH_FRONTEND_API_URL:-http://api:8020}
      REACHPATH_API_KEY: ${REACHPATH_FRONTEND_API_KEY:?set REACHPATH_FRONTEND_API_KEY in .env}
      REACHPATH_WORKSPACE_ID: ${REACHPATH_FRONTEND_WORKSPACE_ID:-default}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      REACHPATH_DOMAIN: ${REACHPATH_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - reachpath-caddy-data:/data
      - reachpath-caddy-config:/config
    depends_on:
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"

volumes:
  reachpath-postgres:
  reachpath-caddy-data:
  reachpath-caddy-config:
